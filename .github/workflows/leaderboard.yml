name: Sort Leaderboard

on:
  push:
    paths:
      - 'leaderboard.csv'

jobs:
  sort:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4

    - name: Install pandas
      run: pip install pandas

    - name: Run script
      run: python sort_leaderboard.py

    - name: Commit sorted file
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add leaderboard.csv
        git commit -m "Sorted leaderboard" || echo "No changes"
        git push
